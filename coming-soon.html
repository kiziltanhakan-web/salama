<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salâma Seda Demren — Yakında</title>
    <meta name="description" content="Nefes, sinir sistemi ve varoluşsal farkındalık üzerine yeni alan, sessizce hazırlanıyor.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green:   #1B3829;
            --green-2: #243F30;
            --cream:   #F2EDE3;
            --cream-bg:#FAF7F2;
            --muted:   rgba(242,237,227,.55);
            --line:    rgba(242,237,227,.18);
        }

        html, body { height: 100%; }

        body {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            color: var(--cream);
            background: var(--green);
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 70% 55% at 50% 110%, rgba(36,63,48,.7) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(242,237,227,.04) 0%, transparent 65%);
            pointer-events: none;
        }

        main {
            min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            padding: 80px 32px;
            position: relative; z-index: 1;
        }

        .eyebrow {
            font-size: 10px; font-weight: 400;
            letter-spacing: .32em; text-transform: uppercase;
            color: rgba(242,237,227,.5);
            margin-bottom: 56px;
        }

        .name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(72px, 13vw, 148px);
            font-weight: 300; letter-spacing: .04em;
            color: var(--cream); line-height: .9;
            margin-bottom: 36px;
        }

        .divider {
            width: 44px; height: 1px;
            background: rgba(242,237,227,.35);
            margin: 0 auto 36px;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 2.2vw, 26px);
            font-style: italic; font-weight: 300;
            color: rgba(242,237,227,.72);
            max-width: 560px; line-height: 1.55;
            margin-bottom: 36px;
        }

        .body-copy {
            max-width: 480px;
            font-size: 14px; font-weight: 300;
            line-height: 1.95;
            color: rgba(242,237,227,.6);
            margin-bottom: 64px;
        }

        .socials {
            display: flex; gap: 28px; align-items: center;
            margin-bottom: 12px;
        }
        .socials a {
            display: inline-flex; align-items: center; gap: 8px;
            color: rgba(242,237,227,.7);
            text-decoration: none;
            font-size: 11px; font-weight: 400;
            letter-spacing: .18em; text-transform: uppercase;
            padding: 10px 0;
            border-bottom: 1px solid transparent;
            transition: color .25s, border-color .25s;
        }
        .socials a:hover {
            color: var(--cream);
            border-bottom-color: rgba(242,237,227,.4);
        }
        .socials svg { width: 14px; height: 14px; }

        footer {
            position: absolute; bottom: 28px; left: 0; right: 0;
            text-align: center;
            font-size: 11px; font-weight: 300;
            color: rgba(242,237,227,.35);
            letter-spacing: .08em;
            z-index: 2;
        }
        footer a {
            color: rgba(242,237,227,.55);
            text-decoration: none;
            font-style: italic;
            border-bottom: 1px solid rgba(242,237,227,.18);
            transition: color .25s, border-color .25s;
        }
        footer a:hover {
            color: var(--cream);
            border-bottom-color: rgba(242,237,227,.5);
        }

        @media (max-width: 600px) {
            main { padding: 60px 24px 120px; }
            .eyebrow { margin-bottom: 40px; }
            .name { margin-bottom: 28px; }
            .divider { margin-bottom: 28px; }
            .tagline { margin-bottom: 28px; }
            .body-copy { margin-bottom: 44px; font-size: 13px; }
            .socials { gap: 20px; flex-wrap: wrap; justify-content: center; }
            footer { bottom: 20px; padding: 0 16px; }
        }

        @keyframes breathe {
            0%, 100% { opacity: .9; transform: scale(1); }
            50%      { opacity: 1;  transform: scale(1.008); }
        }
        .name { animation: breathe 7s ease-in-out infinite; }
    </style>
</head>
<body>
    <main>
        <div class="eyebrow">Hazırlanıyor</div>

        <h1 class="name">Salâma</h1>

        <div class="divider"></div>

        <p class="tagline">
            Bir nefes mesafesinde,<br>sessizce açılan bir alan.
        </p>

        <p class="body-copy">
            Nefes, sinir sistemi düzenlenmesi ve varoluşsal farkındalık üzerine
            uzun yıllardır süregelen çalışmalar; yakında burada, kendi alanında
            sizinle buluşacak.
        </p>

        <div class="socials">
            <a href="https://www.instagram.com/salama_demren" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="3" y="3" width="18" height="18" rx="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="17.5" cy="6.5" r=".7" fill="currentColor"/>
                </svg>
                Instagram
            </a>
            <a href="https://www.youtube.com/@SalamaDemren" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                    <rect x="2" y="5" width="20" height="14" rx="3"/>
                    <path d="M10 9.5v5l4.5-2.5z" fill="currentColor" stroke="none"/>
                </svg>
                YouTube
            </a>
        </div>
    </main>

    <footer>
        Bu site <a href="https://klera.design" target="_blank" rel="noopener">Klera.design</a> tarafından tasarlandı.
    </footer>
</body>
</html>
